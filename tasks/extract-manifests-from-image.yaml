apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: extract-manifests-from-image
spec:
  description: >-
    Tekton task to extract manifests.yaml from configuration-as-code image
  workspaces:
    - name: output
  params:
    - name: snapshotSpecFile
      type: string
      description: Path to the stored Snapshot spec JSON file
    - name: imagePattern
      type: string
      default: "quay.io/redhat-user-workloads/tturek-tenant/configuration-as-code"
      description: Pattern to identify the configuration-as-code image
  results:
    - name: manifestsFile
      description: Path to the extracted manifests.yaml file
  steps:
    - name: extract-manifests
      image: quay.io/konflux-ci/appstudio-utils:48c311af02858e2422d6229600e9959e496ddef1@sha256:91ddd999271f65d8ec8487b10f3dd378f81aa894e11b9af4d10639fd52bba7e8
      workingDir: /workspace/output/source
      env:
        - name: HOME
          value: /workspace
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        SNAPSHOT_SPEC_FILE="$(params.snapshotSpecFile)"
        IMAGE_PATTERN="$(params.imagePattern)"
        
        echo "Reading snapshot spec from: $SNAPSHOT_SPEC_FILE"
        
        if [ ! -f "$SNAPSHOT_SPEC_FILE" ]; then
          echo "ERROR: Snapshot spec file not found: $SNAPSHOT_SPEC_FILE"
          exit 1
        fi
        
        # Extract the configuration-as-code image URL from snapshot
        CONFIG_IMAGE=$(jq -r --arg pattern "$IMAGE_PATTERN" '
          .snapshot_spec.components[] | 
          select(.containerImage | contains($pattern)) | 
          .containerImage' "$SNAPSHOT_SPEC_FILE")
        
        if [ -z "$CONFIG_IMAGE" ] || [ "$CONFIG_IMAGE" = "null" ]; then
          echo "ERROR: No image matching pattern '$IMAGE_PATTERN' found in snapshot"
          echo "Available images in snapshot:"
          jq -r '.snapshot_spec.components[].containerImage' "$SNAPSHOT_SPEC_FILE"
          exit 1
        fi
        
        echo "Found configuration-as-code image: $CONFIG_IMAGE"
        
        # Create a temporary directory for extraction
        TEMP_DIR=$(mktemp -d)
        cd "$TEMP_DIR"
        
        echo "Extracting manifests.yaml from image: $CONFIG_IMAGE"
        
        # Use oc image extract to extract the manifests.yaml file
        echo "Extracting /manifests.yaml from image"
        oc image extract "$CONFIG_IMAGE" --path="/manifests.yaml:." || {
          echo "ERROR: Failed to extract /manifests.yaml from image $CONFIG_IMAGE"
          echo "Checking if the file exists in the image..."
          # Try to list the contents to debug
          oc image extract "$CONFIG_IMAGE" --path="/.:." --confirm 2>/dev/null || true
          ls -la .
          exit 1
        }
        
        if [ ! -f "./manifests.yaml" ]; then
          echo "ERROR: manifests.yaml not found in extracted content"
          echo "Contents of extracted directory:"
          ls -la .
          exit 1
        fi
        
        echo "Successfully extracted manifests.yaml"
        
        # Move manifests to workspace output
        MANIFESTS_FILE="/workspace/output/manifests.yaml"
        mv ./manifests.yaml "$MANIFESTS_FILE"
        
        echo "Manifests saved to: $MANIFESTS_FILE"
        echo "Content preview:"
        head -20 "$MANIFESTS_FILE"
        
        # Clean up temp directory
        cd /workspace/output/source
        rm -rf "$TEMP_DIR"
        
        # Set result
        echo -n "$MANIFESTS_FILE" > "$(results.manifestsFile.path)"

