apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deploy-konflux-config
spec:
  params:
  - description: Source Repository URL
    name: git-url
    type: string
  - default: ""
    description: Revision of the Source Repository
    name: revision
    type: string
  - default: konflux-configs/overlay/prod
    description: Path to the kustomization directory to apply
    name: kustomize-path
    type: string
  - default: "false"
    description: Whether to actually apply the changes (true) or just test (false)  
    name: apply-changes
    type: string
  results:
  - description: Git URL of the repository
    name: CHAINS-GIT_URL
    value: $(tasks.clone-repository.results.url)
  - description: Git commit SHA
    name: CHAINS-GIT_COMMIT
    value: $(tasks.clone-repository.results.commit)
  tasks:
  - name: init
    params:
    - name: image-url
      value: "registry.redhat.io/ubi9-minimal:latest"
    - name: rebuild
      value: "false"
    - name: skip-checks
      value: "true"
    taskRef:
      params:
      - name: name
        value: init
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-init:0.2@sha256:526a104a3342e36dad5c5e7f98c647da6b2a33897e458f772ff4afe523e0690a
      - name: kind
        value: task
      resolver: bundles
  - name: clone-repository
    params:
    - name: url
      value: $(params.git-url)
    - name: revision
      value: $(params.revision)
    runAfter:
    - init
    taskRef:
      params:
      - name: name
        value: git-clone
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.1@sha256:b1fba408e3f50cc302eb5bf66bae1775535267427c78b0665d8342931d54f6ff
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: output
      workspace: workspace
    - name: basic-auth
      workspace: git-auth
  - name: test-kustomization
    runAfter:
    - clone-repository
    taskRef:
      resolver: git
      params:
      - name: url
        value: 'https://github.com/osmman/pipelines.git'
      - name: revision
        value: 'konflux-configuration-as-code'
      - name: pathInRepo
        value: 'tasks/apply-manifest.yaml'
    params:
    - name: manifest
      value: $(params.kustomize-path)
    - name: release
      value: "false"
    workspaces:
    - name: output
      workspace: workspace
  - name: apply-kustomization
    runAfter:
    - test-kustomization
    taskRef:
      resolver: git
      params:
      - name: url
        value: 'https://github.com/osmman/pipelines.git'
      - name: revision
        value: 'konflux-configuration-as-code'
      - name: pathInRepo
        value: 'tasks/apply-manifest.yaml'
    params:
    - name: manifest
      value: $(params.kustomize-path)
    - name: release
      value: $(params.apply-changes)
    workspaces:
    - name: output
      workspace: workspace
  workspaces:
  - name: workspace
  - name: git-auth
    optional: true
