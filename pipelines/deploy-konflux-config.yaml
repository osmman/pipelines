apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deploy-konflux-config
spec:
  description: |
    Konflux release plan pipeline that processes snapshots containing configuration-as-code
    images and applies the manifests to the tturek-tenant namespace
  params:
    - name: snapshot
      type: string
      description: The namespaced name (namespace/name) of the Snapshot
    - name: dryRun
      type: string
      default: "true"
      description: Whether to perform a dry run without actually applying changes (true/false)
    - name: targetNamespace
      type: string
      default: "tturek-tenant"
      description: Target namespace for applying Konflux configuration manifests
  tasks:
    - name: parse-snapshot
      taskRef:
        resolver: git
        params:
          - name: url
            value: "https://github.com/osmman/pipelines.git"
          - name: revision
            value: configuration-as-code
          - name: pathInRepo
            value: tasks/parse-snapshot.yaml
      params:
        - name: snapshot
          value: $(params.snapshot)
      workspaces:
        - name: output
          workspace: workspace
          
    - name: extract-manifests
      runAfter:
        - parse-snapshot
      taskRef:
        resolver: git
        params:
          - name: url
            value: "https://github.com/osmman/pipelines.git"
          - name: revision
            value: configuration-as-code
          - name: pathInRepo
            value: tasks/extract-manifests-from-image.yaml
      params:
        - name: snapshotSpecFile
          value: "$(tasks.parse-snapshot.results.snapshotSpecFile)"
        - name: imagePattern
          value: "quay.io/osmman/configuration-as-code"
      workspaces:
        - name: output
          workspace: workspace
          
    - name: apply-manifests
      runAfter:
        - extract-manifests
      taskRef:
        resolver: git
        params:
          - name: url
            value: "https://github.com/osmman/pipelines.git"
          - name: revision
            value: configuration-as-code
          - name: pathInRepo
            value: tasks/apply-manifests-to-namespace.yaml
      params:
        - name: manifestsFile
          value: "$(tasks.extract-manifests.results.manifestsFile)"
        - name: namespace
          value: $(params.targetNamespace)
        - name: dryRun
          value: $(params.dryRun)
      workspaces:
        - name: output
          workspace: workspace
          
  workspaces:
    - name: workspace

